<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Student Manager</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <h1>Student Managment</h1>

      <div class="form-box">
        <input type="text" id="roll" placeholder="Roll Number" />
        <input type="text" id="name" placeholder="Student Name" />
        <button id="addBtn">Add Student</button>
      </div>

      <div class="controls">
        <input type="text" id="search" placeholder="Search student..." />

        <button id="sortBtn">Sort A-Z</button>
        <button id="highlightBtn">Highlight First</button>
      </div>

      <ul id="studentList"></ul>

      <div class="info">
        <p id="total">Total Students: 0</p>
        <p id="attendance">Present: 0 | Absent: 0</p>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
